name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build with Maven (skip tests)
        run: mvn -B -DskipTests package

      - name: List target contents
        run: ls -la target || true

      - name: Upload fat jar
        uses: actions/upload-artifact@v5
        with:
          name: fhir-pkg-tool.jar
          path: target/fhir-pkg-tool.jar
          if-no-files-found: error

  native-smoke:
    name: Native Smoke (Linux x64)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up GraalVM JDK 21
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm-community
          java-version: '21'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: maven

      - name: Build native image (skip tests)
        run: mvn -B -DskipTests -Pnative verify

      - name: Smoke test native binary
        shell: bash
        run: |
          BIN="./target/fhir-pkg-tool"
          if [ ! -f "$BIN" ]; then
            BIN="./fhir-pkg-tool"
          fi
          if [ ! -f "$BIN" ]; then
            echo "Native binary not found in ./target or repo root" >&2
            ls -la target || true
            ls -la . || true
            exit 1
          fi
          "$BIN" --help
