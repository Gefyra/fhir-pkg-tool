name: Test Environment

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-env:
    name: Test Cache Path (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-latest
          - windows-2025
          - macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build with Maven
        run: mvn -B package -DskipTests

      - name: Verify fallback to HOME in GitHub Actions
        shell: bash
        run: |
          set -euo pipefail
          home_marker="codex-home-marker"
          user_marker="codex-user-marker"
          home_override="$PWD/.ci-tmp/$home_marker"
          user_override="$PWD/.ci-tmp/$user_marker"
          mkdir -p "$home_override" "$user_override"

          output="$(HOME="$home_override" GITHUB_ACTIONS=true java -Duser.home="$user_override" -jar target/fhir-pkg-tool.jar 2>&1 || true)"
          configured="$(printf '%s\n' "$output" | sed -n 's/^  Configured output directory: //p' | head -n 1)"

          if [ -z "$configured" ]; then
            echo "Failed to parse configured output directory from tool output" >&2
            echo "$output" >&2
            exit 1
          fi

          echo "Configured output directory (GITHUB_ACTIONS=true): $configured"
          if [[ "$configured" != *"$home_marker"* ]]; then
            echo "Expected HOME fallback path segment '$home_marker' not found" >&2
            echo "$output" >&2
            exit 1
          fi
          if [[ "$configured" == *"$user_marker"* ]]; then
            echo "Unexpected user.home path segment '$user_marker' found while fallback should use HOME" >&2
            echo "$output" >&2
            exit 1
          fi

      - name: Verify default path uses user.home outside GitHub fallback
        shell: bash
        run: |
          set -euo pipefail
          home_marker="codex-home-marker-no-fallback"
          user_marker="codex-user-marker-no-fallback"
          home_override="$PWD/.ci-tmp/$home_marker"
          user_override="$PWD/.ci-tmp/$user_marker"
          mkdir -p "$home_override" "$user_override"

          output="$(HOME="$home_override" GITHUB_ACTIONS=false java -Duser.home="$user_override" -jar target/fhir-pkg-tool.jar 2>&1 || true)"
          configured="$(printf '%s\n' "$output" | sed -n 's/^  Configured output directory: //p' | head -n 1)"

          if [ -z "$configured" ]; then
            echo "Failed to parse configured output directory from tool output" >&2
            echo "$output" >&2
            exit 1
          fi

          echo "Configured output directory (GITHUB_ACTIONS=false): $configured"
          if [[ "$configured" != *"$user_marker"* ]]; then
            echo "Expected user.home path segment '$user_marker' not found" >&2
            echo "$output" >&2
            exit 1
          fi
          if [[ "$configured" == *"$home_marker"* ]]; then
            echo "Unexpected HOME path segment '$home_marker' found while fallback should be disabled" >&2
            echo "$output" >&2
            exit 1
          fi
